name: BalSync
version: 1.3.1
main: com.user404_.balsync.BalSyncPlugin
api-version: '1.21'
description: Synchronizes player balances with MySQL database
author: user404_
website: https://deutschich.github.io/BalSync

depend: [Vault]

commands:
  balsync:
    description: Main command for BalSync
    usage: /<command> [reload|save|load|status]
    permission: balsync.admin

permissions:
  balsync.admin:
    description: Allows access to all BalSync commands
    default: op
  balsync.sync:
    description: Allows the player to be synchronized with the database (on join and external changes)
    default: true