# Database Configuration
database:
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: "password"
  use-ssl: false
  connection-pool:
    maximum-pool-size: 10
    minimum-idle: 5
    connection-timeout: 30000
    idle-timeout: 600000

# Plugin Settings
settings:
  # Auto-save interval in seconds (0 to disable)
  auto-save-interval: 60
  # Whether to save on player quit
  save-on-quit: true
  # Starting balance for new players
  starting-balance: 100.0
  # Locale for messages (en, de, etc.), List of supported languages/locales can be found at https://github.com/deutschich/BalSync/wiki/Languages#supported-languages.
  locale: "en"

  # Reset to zero before loading from database on join
  reset-on-join: false

  # Monitor offline balance changes when auto-save-interval = 0
  monitor-offline-changes: true

  # Poll database for changes (interval in seconds, 0 = disabled)
  db-poll-interval: 10

  # Notification when balance is changed externally
  notify-on-external-change: true

  # Log balance actions (reset, load, external changes) to console
  log-balance-actions: true

  # Notify player when balance is synchronized on join
  notify-player-on-sync: true

  # Log the "Saving all player balances..." and "Saved X player balances..." messages to console
  log-save-all-messages: true

  # Message display method: "chat" (default) or "actionbar"
  message-display: "chat"

# Database Table Configuration
tables:
  player_balances:
    table-name: "player_balances"
    uuid-column: "player_uuid"
    balance-column: "balance"
    last-updated-column: "last_updated"